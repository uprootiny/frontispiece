services:
  frontispiece:
    build: .
    ports:
      - "41730:41730"
    environment:
      - DATABASE_PATH=/app/data/frontispiece.db
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=frontispiece.dissemblage.art
      - PHX_SCHEME=http
      - PORT=41730
    volumes:
      - frontispiece_data:/app/data
    restart: unless-stopped

volumes:
  frontispiece_data:
